name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Python services ──────────────────────────────────────────────────────────
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - sdlc-app/services/copilot-agent
          - atlassian-bridge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint ${{ matrix.service }}
        run: ruff check ${{ matrix.service }}

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdlc-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
